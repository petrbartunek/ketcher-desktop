<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="Content-Security-Policy"
          content="default-src 'self' 'unsafe-inline' 'unsafe-eval' data: blob:;" />
    <title>Ketcher Desktop</title>
    <style>
      html, body, #root { height: 100%; margin: 0; padding: 0; }
      body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
    </style>
    <script>
      // Some transitive Ketcher deps carry stray `require(...)` calls that
      // Rollup didn't strip in production bundles. We run entirely in the
      // renderer (contextIsolation: true, nodeIntegration: false), so there's
      // no real CommonJS `require`. Provide a no-op stub so the reference
      // doesn't crash module init; anything that actually needs Node modules
      // would've broken in dev mode already.
      if (typeof window.require === 'undefined') {
        window.require = function requireStub(name) {
          console.warn('[require-stub] ignored require(' + JSON.stringify(name) + ')');
          return {};
        };
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="./main.jsx"></script>
  </body>
</html>
