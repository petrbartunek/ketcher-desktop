# Build native installers for macOS (Apple Silicon + Intel), Windows,
# and Linux whenever a version tag is pushed, then attach the artifacts
# to a draft GitHub Release. Triggered manually via "workflow_dispatch"
# too, so you can produce a set of installers off any branch without
# cutting a release.
#
# Why three runners? electron-builder must run on the same OS family
# it's producing artifacts for: macOS runner for .dmg (and for access
# to the Xcode code-signing toolchain), Windows runner for .exe, Linux
# runner for .AppImage. Trying to cross-build Windows from macOS works
# only with Wine, and cross-building macOS from anywhere else doesn't
# work at all.

name: Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest        # Apple Silicon runner; cross-builds
            platform: mac           # both arm64 and x64 DMGs from one job
            arch_flags: '--arm64 --x64'
          - os: windows-latest
            platform: win
            arch_flags: '--x64'
          - os: ubuntu-latest
            platform: linux
            arch_flags: '--x64'

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build renderer
        run: npm run build:renderer

      - name: Package installers
        run: npx electron-builder --${{ matrix.platform }} ${{ matrix.arch_flags }} --publish never
        env:
          # Tell electron-builder not to auto-discover a code-signing
          # identity. Without this, empty-string CSC_LINK/CSC_KEY_PASSWORD
          # (which is what GitHub Actions produces when the secret isn't
          # defined) confuses it into "signing mode" and the build dies
          # on macOS with "$WORKSPACE not a file". Our afterPack hook
          # still does ad-hoc signing so the arm64 DMG can actually run.
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'
          # When real certs are configured as secrets, uncomment the
          # matching block below (and remove/override CSC_IDENTITY_AUTO_DISCOVERY)
          # so electron-builder's full signing + notarization pipeline kicks in.
          #
          # macOS (Apple Developer ID + notarization):
          # APPLE_ID: ${{ secrets.APPLE_ID }}
          # APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          # APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          # CSC_LINK: ${{ secrets.MAC_CSC_LINK }}
          # CSC_KEY_PASSWORD: ${{ secrets.MAC_CSC_KEY_PASSWORD }}
          #
          # Windows code-signing cert:
          # WIN_CSC_LINK: ${{ secrets.WIN_CSC_LINK }}
          # WIN_CSC_KEY_PASSWORD: ${{ secrets.WIN_CSC_KEY_PASSWORD }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ketcher-desktop-${{ matrix.platform }}
          path: |
            release/*.dmg
            release/*.exe
            release/*.AppImage
            release/*.blockmap
          if-no-files-found: ignore

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          generate_release_notes: true
          files: artifacts/**/*
